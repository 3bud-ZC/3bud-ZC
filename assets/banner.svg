<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="460" viewBox="0 0 1400 460">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="50%" stop-color="#080810"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <radialGradient id="g1" cx="28%" cy="32%" r="42%">
      <stop offset="0%" stop-color="#9333ea" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="78%" cy="72%" r="38%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="52%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0L0 0 0 36" fill="none" stroke="#fff" stroke-opacity=".025" stroke-width=".6"/>
    </pattern>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
      .t1{font-size:56px;font-weight:800;fill:#f8f8ff;letter-spacing:-.5px}
      .t2{font-size:24px;font-weight:600;fill:#a855f7}
      .t3{font-size:16px;font-weight:400;fill:#9090b0}
      .ch{font-size:11px;font-weight:500;fill:#c4b5fd}
      .ct{font-size:12px;font-weight:700;fill:#f8f8ff}
      .cs{font-size:10px;font-weight:400;fill:#7070a0}
      .cg{font-size:10px;font-weight:600;fill:#34d399}

      @keyframes f1{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes f2{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
      @keyframes gp{0%,100%{opacity:.55;transform:scale(.97)}50%{opacity:1;transform:scale(1.03)}}
      @keyframes pp{0%,100%{opacity:.2}50%{opacity:.6}}
      @keyframes orb{to{transform:rotate(360deg)}}

      .fl1{animation:f1 7s ease-in-out infinite}
      .fl2{animation:f2 6s ease-in-out infinite 2s}
      .fl3{animation:f2 8s ease-in-out infinite 1s}
      .glow{animation:gp 6s ease-in-out infinite}
      .glow2{animation:gp 6s ease-in-out infinite 3s}
      .dot{animation:pp 3s ease-in-out infinite}
      .o1{animation:orb 45s linear infinite;transform-origin:700px 230px}
      .o2{animation:orb 60s linear infinite reverse;transform-origin:700px 230px}
    </style>
  </defs>

  <!-- BG matching #050508 -->
  <rect width="1400" height="460" rx="16" fill="url(#bg)"/>
  <rect width="1400" height="460" rx="16" fill="url(#grid)"/>

  <!-- Ambient Glows (same as abud.fun radial-gradient) -->
  <ellipse cx="350" cy="145" rx="450" ry="270" fill="url(#g1)" class="glow"/>
  <ellipse cx="1050" cy="310" rx="400" ry="250" fill="url(#g2)" class="glow2"/>
  <ellipse cx="700" cy="230" rx="550" ry="320" fill="url(#g3)"/>

  <!-- Orbits (subtle) -->
  <circle cx="700" cy="230" r="340" fill="none" stroke="#9333ea" stroke-width=".5" stroke-opacity=".08" stroke-dasharray="8 16" class="o1"/>
  <circle cx="700" cy="230" r="240" fill="none" stroke="#6d28d9" stroke-width=".4" stroke-opacity=".06" stroke-dasharray="5 12" class="o2"/>

  <!-- Particles -->
  <circle cx="130" cy="85" r="1.5" fill="#c084fc" class="dot"/>
  <circle cx="370" cy="395" r="1.5" fill="#a855f7" class="dot" style="animation-delay:1s"/>
  <circle cx="630" cy="50" r="1.2" fill="#e9d5ff" class="dot" style="animation-delay:.5s"/>
  <circle cx="890" cy="42" r="1.5" fill="#c084fc" class="dot" style="animation-delay:2s"/>
  <circle cx="1150" cy="105" r="1.2" fill="#a78bfa" class="dot" style="animation-delay:1.5s"/>
  <circle cx="1290" cy="365" r="1.5" fill="#9333ea" class="dot" style="animation-delay:.8s"/>
  <circle cx="230" cy="255" r="1.2" fill="#e9d5ff" class="dot" style="animation-delay:2.2s"/>
  <circle cx="1210" cy="185" r="1.5" fill="#a78bfa" class="dot" style="animation-delay:1.8s"/>

  <!-- ======= CENTER TEXT ======= -->
  <text x="700" y="170" text-anchor="middle" class="t1">Abdullah Ragab</text>
  <text x="700" y="215" text-anchor="middle" class="t2">Full-Stack Developer <tspan fill="#67e8f9">×</tspan> AI Automation Builder</text>
  <text x="700" y="252" text-anchor="middle" class="t3">Arabic-first platforms <tspan fill="#6d28d9">•</tspan> Business systems <tspan fill="#6d28d9">•</tspan> Telegram bots <tspan fill="#6d28d9">•</tspan> Local-first tools</text>

  <!-- Tech Chips (abud.fun tag-pill style) -->
  <g text-anchor="middle" transform="translate(700,305)">
    <g transform="translate(-275,0)"><rect x="-38" y="-13" width="76" height="26" rx="13" fill="none" stroke="#fff" stroke-opacity=".1"/><text y="4" class="ch">Next.js</text></g>
    <g transform="translate(-170,0)"><rect x="-48" y="-13" width="96" height="26" rx="13" fill="none" stroke="#fff" stroke-opacity=".1"/><text y="4" class="ch">TypeScript</text></g>
    <g transform="translate(-60,0)"><rect x="-35" y="-13" width="70" height="26" rx="13" fill="none" stroke="#fff" stroke-opacity=".1"/><text y="4" class="ch">Python</text></g>
    <g transform="translate(50,0)"><rect x="-48" y="-13" width="96" height="26" rx="13" fill="none" stroke="#fff" stroke-opacity=".1"/><text y="4" class="ch">PostgreSQL</text></g>
    <g transform="translate(155,0)"><rect x="-27" y="-13" width="54" height="26" rx="13" fill="none" stroke="#fff" stroke-opacity=".1"/><text y="4" class="ch">VPS</text></g>
    <g transform="translate(260,0)"><rect x="-52" y="-13" width="104" height="26" rx="13" fill="none" stroke="#9333ea" stroke-opacity=".3"/><text y="4" class="ch">AI Workflows</text></g>
  </g>

  <!-- ======= RIGHT: Dashboard Card (abud.fun card style) ======= -->
  <g class="fl1" transform="translate(1080,75)">
    <!-- Card body: bg-white/[0.03] border-white/10 rounded-2xl -->
    <rect width="240" height="175" rx="16" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".1" stroke-width="1"/>
    <!-- Purple icon box (like abud.fun service icons) -->
    <rect x="16" y="16" width="36" height="36" rx="10" fill="url(#purpleIconGrad)"/>
    <defs><linearGradient id="purpleIconGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse"><stop stop-color="#9333ea"/><stop offset="1" stop-color="#6d28d9"/></linearGradient></defs>
    <!-- Zap icon (like abud.fun) -->
    <polygon points="30,22 26,30 30,30 29,38 35,28 31,28 32,22" fill="#67e8f9" stroke="none"/>
    <text x="62" y="32" class="ct">System Dashboard</text>
    <text x="62" y="46" class="cs">Real-time monitoring</text>
    <!-- Metric rows -->
    <text x="16" y="78" class="cs">API Requests</text>
    <rect x="16" y="84" width="208" height="4" rx="2" fill="#ffffff" fill-opacity=".05"/>
    <rect x="16" y="84" width="156" height="4" rx="2" fill="#9333ea" opacity=".7"/>
    <text x="16" y="108" class="cs">Uptime</text>
    <rect x="16" y="114" width="208" height="4" rx="2" fill="#ffffff" fill-opacity=".05"/>
    <rect x="16" y="114" width="195" height="4" rx="2" fill="#34d399" opacity=".6"/>
    <text x="16" y="138" class="cs">Response Time</text>
    <rect x="16" y="144" width="208" height="4" rx="2" fill="#ffffff" fill-opacity=".05"/>
    <rect x="16" y="144" width="130" height="4" rx="2" fill="#67e8f9" opacity=".5"/>
    <!-- Status -->
    <text x="16" y="168" class="cg">● Production Live</text>
  </g>

  <!-- ======= LEFT-TOP: Terminal Card (abud.fun glass card) ======= -->
  <g class="fl2" transform="translate(60,62)">
    <rect width="200" height="115" rx="16" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".1" stroke-width="1"/>
    <!-- Mini dots -->
    <circle cx="18" cy="18" r="3.5" fill="#ef4444" opacity=".7"/>
    <circle cx="30" cy="18" r="3.5" fill="#eab308" opacity=".7"/>
    <circle cx="42" cy="18" r="3.5" fill="#22c55e" opacity=".7"/>
    <text x="100" y="22" text-anchor="middle" class="cs">terminal</text>
    <text x="16" y="48" class="cs"><tspan fill="#67e8f9">$</tspan> npm run build</text>
    <text x="16" y="64" class="cg">✓ compiled successfully</text>
    <text x="16" y="80" class="cs"><tspan fill="#67e8f9">$</tspan> pm2 start server</text>
    <text x="16" y="96" class="cg">✓ process online</text>
  </g>

  <!-- ======= LEFT-BOTTOM: AI Card (abud.fun glassmorphism) ======= -->
  <g class="fl3" transform="translate(50,255)">
    <rect width="190" height="92" rx="16" fill="#ffffff" fill-opacity=".03" stroke="#9333ea" stroke-opacity=".2" stroke-width="1"/>
    <!-- Purple gradient icon -->
    <rect x="14" y="14" width="28" height="28" rx="8" fill="url(#purpleIconGrad)"/>
    <!-- Brain icon abstraction -->
    <circle cx="28" cy="28" r="7" fill="none" stroke="#67e8f9" stroke-width="1.5"/>
    <circle cx="25" cy="26" r="1.5" fill="#67e8f9"/>
    <circle cx="31" cy="26" r="1.5" fill="#67e8f9"/>
    <circle cx="28" cy="31" r="1.5" fill="#67e8f9"/>
    <text x="52" y="28" class="ct">AI Automation</text>
    <text x="52" y="40" class="cs">Agent workflows</text>
    <!-- Progress (abud.fun bar style) -->
    <text x="14" y="62" class="cs">Workflow Status</text>
    <rect x="14" y="70" width="162" height="4" rx="2" fill="#ffffff" fill-opacity=".05"/>
    <rect x="14" y="70" width="120" height="4" rx="2" fill="#a855f7" opacity=".6"/>
    <text x="140" y="62" class="cg">Active</text>
  </g>

  <!-- ======= RIGHT-BOTTOM: Status Pill (abud.fun status badge style) ======= -->
  <g class="fl2" style="animation-delay:1s" transform="translate(1140,290)">
    <rect width="165" height="68" rx="16" fill="#ffffff" fill-opacity=".03" stroke="#ffffff" stroke-opacity=".1" stroke-width="1"/>
    <text x="14" y="24" class="ct">Deploy Status</text>
    <text x="14" y="42" class="cs">Environment: <tspan class="cg">Production</tspan></text>
    <text x="14" y="58" class="cs">Uptime: <tspan fill="#c4b5fd">99.9%</tspan></text>
  </g>

  <!-- Top glow line (matching abud.fun loading bar gradient) -->
  <rect x="0" y="0" width="1400" height="3" rx="1.5">
    <defs>
      <linearGradient id="topLine" x1="0" y1="0" x2="1400" y2="0" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#7c3aed"/>
        <stop offset="40%" stop-color="#a855f7"/>
        <stop offset="70%" stop-color="#c084fc"/>
        <stop offset="100%" stop-color="#67e8f9"/>
      </linearGradient>
    </defs>
    <animate attributeName="fill" values="url(#topLine);url(#topLine)" dur="1s"/>
  </rect>
  <rect x="0" y="0" width="1400" height="3" rx="1.5" fill="url(#topLine)" opacity=".6"/>
</svg>
