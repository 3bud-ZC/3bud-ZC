<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Seamless GitHub Dark Mode Background -->
    <rect id="bg" width="1200" height="400" fill="#0d1117" rx="15" />
    
    <!-- Subtle Glows -->
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>
    
    <!-- Grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />
    </pattern>

    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .name { font-weight: 800; font-size: 52px; fill: #F8FAFC; letter-spacing: -1px; }
      .role { font-weight: 600; font-size: 24px; fill: #A855F7; }
      .desc { font-weight: 400; font-size: 16px; fill: #94A3B8; }
      .chip-bg { fill: #1E293B; stroke: #334155; stroke-width: 1px; rx: 12px; }
      .chip-text { font-weight: 500; font-size: 13px; fill: #E2E8F0; }
      
      .anim-float { animation: float 6s ease-in-out infinite; }
      .anim-float-delayed { animation: float 6s ease-in-out infinite 3s; }
      .anim-pulse { animation: pulse 4s ease-in-out infinite alternate; }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes pulse {
        0% { opacity: 0.6; transform: scale(0.98); }
        100% { opacity: 1; transform: scale(1.02); }
      }
    </style>
  </defs>

  <use href="#bg" />
  <rect width="1200" height="400" fill="url(#grid)" rx="15" />
  
  <!-- Ambient Glows -->
  <circle cx="200" cy="100" r="400" fill="url(#glow1)" class="anim-pulse" />
  <circle cx="1000" cy="300" r="350" fill="url(#glow2)" class="anim-pulse" style="animation-delay: -2s;" />

  <!-- Center Content -->
  <g text-anchor="middle">
    <text x="600" y="160" class="name">Abdullah Ragab</text>
    <text x="600" y="210" class="role">Software Engineer &amp; Full-Stack Builder</text>
    <text x="600" y="250" class="desc">Arabic-first platforms • Business systems • Local-first tools</text>
  </g>

  <!-- Abstract Graphic Right (Code/Terminal Window) -->
  <g class="anim-float" transform="translate(900, 100)">
    <rect width="200" height="130" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5" />
    <!-- Window buttons -->
    <circle cx="15" cy="15" r="4" fill="#ef4444" />
    <circle cx="27" cy="15" r="4" fill="#eab308" />
    <circle cx="39" cy="15" r="4" fill="#22c55e" />
    
    <!-- Code lines -->
    <rect x="15" y="40" width="80" height="6" rx="3" fill="#A855F7" opacity="0.8" />
    <rect x="15" y="55" width="120" height="6" rx="3" fill="#38bdf8" opacity="0.6" />
    <rect x="15" y="70" width="60" height="6" rx="3" fill="#c084fc" opacity="0.7" />
    <rect x="15" y="85" width="140" height="6" rx="3" fill="#94a3b8" opacity="0.4" />
  </g>

  <!-- Abstract Graphic Left (AI/Network Node) -->
  <g class="anim-float-delayed" transform="translate(100, 180)">
    <rect width="160" height="80" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5" />
    <path d="M 20 40 L 40 40 L 50 25 L 65 55 L 75 40 L 140 40" fill="none" stroke="#22D3EE" stroke-width="2" stroke-linejoin="round" />
    <circle cx="40" cy="40" r="3" fill="#22D3EE" />
    <circle cx="50" cy="25" r="3" fill="#22D3EE" />
    <circle cx="65" cy="55" r="3" fill="#A855F7" />
    <circle cx="75" cy="40" r="3" fill="#22D3EE" />
  </g>

  <!-- Tech Chips Centered Bottom -->
  <g transform="translate(600, 310)">
    <!-- Next.js -->
    <g transform="translate(-240, 0)">
      <rect x="-35" y="-12" width="70" height="24" class="chip-bg" />
      <text x="0" y="4" text-anchor="middle" class="chip-text">Next.js</text>
    </g>
    <!-- TypeScript -->
    <g transform="translate(-140, 0)">
      <rect x="-40" y="-12" width="80" height="24" class="chip-bg" />
      <text x="0" y="4" text-anchor="middle" class="chip-text">TypeScript</text>
    </g>
    <!-- Python -->
    <g transform="translate(-40, 0)">
      <rect x="-30" y="-12" width="60" height="24" class="chip-bg" />
      <text x="0" y="4" text-anchor="middle" class="chip-text">Python</text>
    </g>
    <!-- Postgres -->
    <g transform="translate(50, 0)">
      <rect x="-40" y="-12" width="80" height="24" class="chip-bg" />
      <text x="0" y="4" text-anchor="middle" class="chip-text">Postgres</text>
    </g>
    <!-- VPS -->
    <g transform="translate(140, 0)">
      <rect x="-25" y="-12" width="50" height="24" class="chip-bg" />
      <text x="0" y="4" text-anchor="middle" class="chip-text">VPS</text>
    </g>
    <!-- AI -->
    <g transform="translate(210, 0)">
      <rect x="-25" y="-12" width="50" height="24" class="chip-bg" />
      <text x="0" y="4" text-anchor="middle" class="chip-text">AI</text>
    </g>
  </g>
</svg>
