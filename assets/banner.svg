<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06070b"/>
      <stop offset="52%" stop-color="#0d1020"/>
      <stop offset="100%" stop-color="#071b24"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="softLeft" cx="24%" cy="30%" r="48%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity=".20"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="softRight" cx="78%" cy="72%" r="45%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity=".035" stroke-width="1"/>
    </pattern>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif}
      .kicker{font-size:15px;font-weight:700;fill:#67e8f9;letter-spacing:1px}
      .title{font-size:64px;font-weight:800;fill:#f8fafc;letter-spacing:0}
      .role{font-size:26px;font-weight:700;fill:#d8b4fe;letter-spacing:0}
      .body{font-size:18px;font-weight:500;fill:#cbd5e1;letter-spacing:0}
      .chip{font-size:13px;font-weight:700;fill:#f8fafc;letter-spacing:0}
      .label{font-size:12px;font-weight:700;fill:#a5b4fc;letter-spacing:.4px}
      .small{font-size:13px;font-weight:500;fill:#cbd5e1;letter-spacing:0}
    </style>
  </defs>

  <rect width="1400" height="420" rx="18" fill="url(#bg)"/>
  <rect width="1400" height="420" rx="18" fill="url(#grid)"/>
  <ellipse cx="320" cy="125" rx="430" ry="240" fill="url(#softLeft)"/>
  <ellipse cx="1080" cy="300" rx="390" ry="220" fill="url(#softRight)"/>
  <rect x="0" y="0" width="1400" height="4" rx="2" fill="url(#accent)"/>

  <g text-anchor="middle">
    <text x="700" y="108" class="kicker">ABUD.FUN  |  GITHUB.COM/3BUD-ZC</text>
    <text x="700" y="176" class="title">Abdullah Ragab</text>
    <text x="700" y="222" class="role">Full-Stack Developer and AI Automation Tool Maker</text>
    <text x="700" y="258" class="body">Websites, internal systems, Telegram bots, AI workflows, and Arabic-first tools</text>
  </g>

  <g text-anchor="middle">
    <g transform="translate(325,304)">
      <rect x="-82" y="-19" width="164" height="38" rx="19" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".12"/>
      <text y="5" class="chip">Next.js / React</text>
    </g>
    <g transform="translate(515,304)">
      <rect x="-86" y="-19" width="172" height="38" rx="19" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".12"/>
      <text y="5" class="chip">TypeScript</text>
    </g>
    <g transform="translate(700,304)">
      <rect x="-78" y="-19" width="156" height="38" rx="19" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".12"/>
      <text y="5" class="chip">Python / Node.js</text>
    </g>
    <g transform="translate(895,304)">
      <rect x="-86" y="-19" width="172" height="38" rx="19" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".12"/>
      <text y="5" class="chip">PostgreSQL</text>
    </g>
    <g transform="translate(1082,304)">
      <rect x="-78" y="-19" width="156" height="38" rx="19" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".12"/>
      <text y="5" class="chip">Docker / VPS</text>
    </g>
  </g>

  <g transform="translate(170,354)">
    <rect width="310" height="38" rx="10" fill="#05070d" fill-opacity=".55" stroke="#ffffff" stroke-opacity=".10"/>
    <text x="18" y="24" class="label">FOCUS</text>
    <text x="84" y="24" class="small">Websites, systems, bots, automation</text>
  </g>

  <g transform="translate(545,354)">
    <rect width="310" height="38" rx="10" fill="#05070d" fill-opacity=".55" stroke="#ffffff" stroke-opacity=".10"/>
    <text x="18" y="24" class="label">PUBLIC</text>
    <text x="86" y="24" class="small">Public GitHub repositories</text>
  </g>

  <g transform="translate(920,354)">
    <rect width="310" height="38" rx="10" fill="#05070d" fill-opacity=".55" stroke="#ffffff" stroke-opacity=".10"/>
    <text x="18" y="24" class="label">CONTACT</text>
    <text x="100" y="24" class="small">abud@abud.fun</text>
  </g>
</svg>
